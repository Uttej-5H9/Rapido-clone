spring.application.name=api-gateway

server.port=8080


eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka

spring.data.redis.host=redis
spring.data.redis.port=6379

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/users/**

spring.cloud.gateway.routes[2].id=ride-service
spring.cloud.gateway.routes[2].uri=lb://RIDE-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/rides/**

spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/payments/**

spring.cloud.gateway.routes[4].id=notification-service
spring.cloud.gateway.routes[4].uri=lb://NOTIFICATION-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/notifications/**

# Redis Rate Limiter
spring.cloud.gateway.redis-rate-limiter.replenishRate=100
spring.cloud.gateway.redis-rate-limiter.burstCapacity=100

# Gateway Timeout
spring.cloud.gateway.httpclient.connect-timeout=5000
spring.cloud.gateway.httpclient.response-timeout=5s

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG

# Correlation ID Logging
logging.pattern.level=%5p [${spring.application.name:},%X{X-Correlation-ID}]

# Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always