spring.application.name=user-service
# ===============================
# APPLICATION CONFIG
# ===============================
server.port=8082

# ===============================
# POSTGRESQL DATABASE CONFIG
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/rapido_db
spring.datasource.username=rapido_user
spring.datasource.password=rapido_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# HIKARI CONNECTION POOL (DEFAULT IN SPRING BOOT)
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=RapidoHikariCP

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Prevent Hibernate from creating schema warnings
spring.jpa.open-in-view=false

# ===============================
# LOGGING (PRODUCTION STYLE)
# ===============================
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# SECURITY (BASIC SETUP FOR NOW)
# ===============================
spring.security.user.name=admin
spring.security.user.password=admin

# ===============================
# ACTUATOR (OPTIONAL BUT RECOMMENDED)
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always