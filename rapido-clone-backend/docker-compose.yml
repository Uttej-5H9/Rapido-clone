version: '3.9'

services:

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: rapido_db
      POSTGRES_USER: rapido_db
      POSTGRES_PASSWORD: Uttej123$


    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always
    networks:
      - rapido-network

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always
    networks:
      - rapido-network

  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always
    networks:
      - rapido-network

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    restart: always
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - rapido-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      - eureka-server
    networks:
      - rapido-network

  auth-service:
    build: ./auth-service
    container_name: auth-service
    restart: always
    depends_on:
      - postgres
      - eureka-server
    networks:
      - rapido-network

  user-service:
    build: ./user-service
    container_name: user-service
    restart: always
    depends_on:
      - postgres
      - eureka-server
    networks:
      - rapido-network

  driver-service:
    build: ./driver-service
    container_name: driver-service
    restart: always
    depends_on:
      - postgres
      - eureka-server
    networks:
      - rapido-network

  ride-service:
    build: ./ride-service
    container_name: ride-service
    restart: always
    depends_on:
      - postgres
      - rabbitmq
      - eureka-server
    networks:
      - rapido-network

  payment-service:
    build: ./payment-service
    container_name: payment-service
    restart: always
    depends_on:
      - postgres
      - rabbitmq
      - eureka-server
    networks:
      - rapido-network

  notification-service:
    build: ./notification-service
    container_name: notification-service
    restart: always
    depends_on:
      - rabbitmq
      - eureka-server
    networks:
      - rapido-network

networks:
  rapido-network:

volumes:
  postgres-data:
  redis-data: