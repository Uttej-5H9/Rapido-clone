

services:

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: rapido_db
      POSTGRES_USER: rapido_db
      POSTGRES_PASSWORD: Uttej123$


    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always
    networks:
      - rapido-network

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always
    networks:
      - rapido-network

  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always
    networks:
      - rapido-network

  services:

  eureka-server:
    build:
      context: ./eureka-server
    ports:
      - "8761:8761"

  api-gateway:
    build:
      context: ./api-gateway
    ports:
      - "8080:8080"

  auth-service:
    build:
      context: ./auth-service

  user-service:
    build:
      context: ./user-service

  driver-service:
    build:
      context: ./driver-service

  ride-service:
    build:
      context: ./ride-service

networks:
  rapido-network:

volumes:
  postgres-data:
  redis-data:
